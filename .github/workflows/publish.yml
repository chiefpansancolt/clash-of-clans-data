name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@chiefpansancolt"
      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0
      - run: pnpm build
      - name: Scope package for GitHub Packages
        run: |
          name=$(jq -r '.name' package.json)
          jq --arg scoped "@chiefpansancolt/${name}" \
            '.name = $scoped | .publishConfig = {"registry": "https://npm.pkg.github.com"}' \
            package.json > package.tmp.json
          mv package.tmp.json package.json
      - name: Check if version exists on GitHub Packages
        id: check
        run: |
          version=$(jq -r '.version' package.json)
          scoped=$(jq -r '.name' package.json)
          if npm view "${scoped}@${version}" version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${version} already published to GitHub Packages — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to GitHub Packages
        if: steps.check.outputs.exists == 'false'
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0
      - run: pnpm build
      - name: Check if version exists on npm
        id: check
        run: |
          version=$(jq -r '.version' package.json)
          name=$(jq -r '.name' package.json)
          if npm view "${name}@${version}" version --registry=https://registry.npmjs.org 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${version} already published to npm — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-github, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"
      - name: Check if release already exists
        id: check
        run: |
          version="${{ steps.version.outputs.version }}"
          if gh release view "v${version}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${version} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract changelog for version
        if: steps.check.outputs.exists == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "v${version}" \
            --title "v${version}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
